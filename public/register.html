<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Tablero de Materias</title>
    <link rel="icon" type="image/png" href="img/logo_azul.png">
    <link rel="apple-touch-icon" href="img/Logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Crear una cuenta</h1>
            <p>Comienza a organizar tus materias hoy mismo</p>
            
            <div class="error-message" id="errorMsg"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required autocomplete="email" placeholder="Tu correo electrónico">
                </div>
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" required autocomplete="username" placeholder="Elige un usuario">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required autocomplete="new-password" placeholder="Crea una contraseña">
                        <button type="button" class="password-toggle" data-target="password" aria-label="Mostrar contraseña">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" required autocomplete="new-password" placeholder="Repite tu contraseña">
                        <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Mostrar contraseña">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Registrarse</button>
            </form>
            
            <div class="auth-footer">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>
    </div>
    <script type="module" src="js/autenticacion.js"></script>
</body>
</html>
