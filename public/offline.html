<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión - Tablero de Materias</title>
    <link rel="icon" type="image/png" href="img/logo_azul.png">
    <link rel="apple-touch-icon" href="img/Logo.jpg">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/offline.css">
</head>
<body class="offline-body">
    <div class="offline-container">
        <img src="img/Logo.jpg" alt="Logo" class="logo-small rounded shadow">
        <div class="icon-wrapper">
            <i class="bi bi-wifi-off"></i>
        </div>
        <h1>¡Ups! Te quedaste sin red</h1>
        <p>No podemos conectar con el servidor en este momento. Las actividades y cambios que realices se guardarán localmente y se llevarán a cabo en cuanto vuelva la conexión.</p>
        
        <button onclick="window.location.reload()" class="btn-retry">
            <i class="bi bi-arrow-clockwise"></i>
            Reintentar conexión
        </button>
        
        <div class="mt-4">
            <small class="text-muted">Tus actividades pendientes se sincronizarán automáticamente al recuperar la señal.</small>
        </div>
    </div>
</body>
</html>
