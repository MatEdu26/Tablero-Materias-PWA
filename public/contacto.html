<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Tablero de Materias</title>
    <link rel="icon" type="image/png" href="img/logo_azul.png">
    <link rel="apple-touch-icon" href="img/Logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="board-body d-flex flex-column min-vh-100">
    <header class="app-header d-flex justify-content-between align-items-center px-4 py-3 border-bottom shadow-sm w-100">
        <div class="header-left">
            <h2 id="boardTitle" class="m-0 fs-4 fw-bold d-flex align-items-center gap-2">
                <img src="img/logo_azul.png" alt="Logo" style="height: 32px; width: 32px; object-fit: cover; border-radius: 4px;">
                Contacto y Sugerencias
            </h2>
        </div>
        <div class="header-right">
            <a href="index.html" class="nav-btn nav-btn-primary"><i class="bi bi-easel2-fill"></i>Tablero</a>
            <span id="userGreeting" class="text-white-50 ms-2" style="font-size: 0.85rem;"></span>

            <button id="logoutBtn" class="nav-btn nav-btn-primary" title="Cerrar Sesión"><i class="bi bi-box-arrow-right"></i>Cerrar Sesión</button>
        </div>
    </header>

    <main class="container flex-grow-1 p-3">
        <div class="d-flex flex-column align-items-center py-4 w-100 gap-4">
            <div class="auth-card" style="max-width: 600px; animation: modalPop 0.3s ease; width: 100%;">
                <h3 class="mb-3"><i class="bi bi-chat-left-text me-2"></i>Envíanos tu mensaje</h3>
                <p class="text-secondary mb-4">Tu opinión nos ayuda a mejorar la plataforma.</p>
                
                <form id="contactForm">
                    <div class="form-group">
                        <label for="contactName">Nombre de Usuario</label>
                        <input type="text" id="contactName" readonly style="background-color: rgba(0,0,0,0.2); cursor: not-allowed;">
                    </div>
                    
                    <div class="form-group">
                        <label for="contactSubject">Asunto</label>
                        <select id="contactSubject" class="form-select" style="background-color: var(--bg-color); color: white; border-color: var(--border-color);" required>
                            <option value="" disabled selected>Selecciona una opción</option>
                            <option value="Contacto">Contacto General</option>
                            <option value="Sugerencia">Sugerencia de Mejora</option>
                            <option value="Consulta">Consulta Técnica</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="contactMessage">Mensaje</label>
                        <textarea id="contactMessage" rows="5" placeholder="Escribe aquí tu mensaje..." style="width: 100%; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-primary); font-family: var(--font-family); resize: vertical;" required maxlength="1000"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="sendBtn">
                        <i class="bi bi-send me-2"></i>Enviar Mensaje
                    </button>
                </form>
            </div>

            <!-- Mis Consultas -->
            <div id="misConsultasContainer" class="consultas-section" style="max-width: 600px; width: 100%; display: none;">
                <h4 class="mb-3"><i class="bi bi-chat-square-text me-2"></i>Mis Consultas y Sugerencias</h4>
                <div id="consultasList" class="d-flex flex-column gap-3">
                    <!-- Se cargará dinámicamente -->
                </div>
            </div>
        </div>
    </main>

    <!-- Barra de Navegación Inferior (Mobile UX) -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item">
            <i class="bi bi-easel2-fill"></i>
            <span>Tablero</span>
        </a>
        <a href="contacto.html" class="mobile-nav-item active">
            <i class="bi bi-envelope"></i>
            <span>Contacto</span>
        </a>

    </nav>

    <!-- Toast de notificaciones -->
    <div id="toastContainer" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none;">
        <div id="toastBox" style="display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.5rem; border-radius: 0.75rem; color: white; font-weight: 600; font-size: 0.95rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: zoomIn 0.2s ease-out forwards; max-width: 420px; text-align: center;">
        </div>
    </div>

    <script type="module" src="js/contacto.js"></script>
</body>
</html>
