<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Tablero de Materias</title>
    <link rel="icon" type="image/png" href="img/logo_azul.png">
    <link rel="apple-touch-icon" href="img/Logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Bienvenido de nuevo</h1>
            <p>Inicia sesión para gestionar tus materias</p>
            
            <div class="error-message" id="errorMsg"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required autocomplete="email" placeholder="Tu correo electrónico">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required autocomplete="current-password" placeholder="Tu contraseña">
                        <button type="button" class="password-toggle" data-target="password" aria-label="Mostrar contraseña">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Ingresar</button>
            </form>
            
            <div class="auth-footer">
                ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
            </div>
        </div>
    </div>
    <script type="module" src="js/autenticacion.js"></script>
</body>
</html>
