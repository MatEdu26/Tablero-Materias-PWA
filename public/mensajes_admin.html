<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeja de Mensajes - Admin</title>
    <link rel="icon" type="image/png" href="img/logo_azul.png">
    <link rel="apple-touch-icon" href="img/Logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="board-body d-flex flex-column min-vh-100">
    <header class="app-header d-flex justify-content-between align-items-center px-4 py-3 border-bottom shadow-sm w-100">
        <div class="header-left">
            <h2 class="m-0 fs-4 fw-bold d-flex align-items-center gap-2">
                <img src="img/logo_azul.png" alt="Logo" style="height: 32px; width: 32px; object-fit: cover; border-radius: 4px;">
                Bandeja de Entrada Admin
            </h2>
        </div>
        <div class="header-right">
            <a href="index.html" class="nav-btn"><i class="bi bi-easel2-fill"></i>Tablero</a>
            <span id="userGreeting" class="text-white-50 ms-2" style="font-size: 0.85rem;"></span>

            <button id="logoutBtn" class="nav-btn nav-btn-warning" title="Cerrar Sesión"><i class="bi bi-box-arrow-right"></i>Cerrar Sesión</button>
        </div>
    </header>

    <main class="container flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="m-0">Mensajes de Usuarios</h3>
                <p class="text-secondary m-0">Gestiona las sugerencias y consultas de los alumnos.</p>
            </div>
            <button class="btn btn-outline-light btn-sm" onclick="loadMessages()">
                <i class="bi bi-arrow-clockwise me-2"></i>Actualizar
            </button>
        </div>

        <div id="messagesList" class="row g-3">
            <!-- Los mensajes se cargarán aquí -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-secondary">Cargando buzón...</p>
            </div>
        </div>
    </main>

    <!-- Barra de Navegación Inferior (Mobile UX) -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item">
            <i class="bi bi-easel2-fill"></i>
            <span>Tablero</span>
        </a>
        <a href="mensajes_admin.html" class="mobile-nav-item active">
            <i class="bi bi-chat-dots"></i>
            <span>Mensajes</span>
        </a>

    </nav>

    <!-- Toast de notificaciones -->
    <div id="toastContainer" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none;">
        <div id="toastBox" style="display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.5rem; border-radius: 0.75rem; color: white; font-weight: 600; font-size: 0.95rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: zoomIn 0.2s ease-out forwards; max-width: 420px; text-align: center;">
        </div>
    </div>

    <!-- Modal de Confirmación -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width: 420px; text-align: center;">
            <p id="confirmMessage" style="font-size: 1rem; margin-bottom: 1.5rem; color: var(--text-primary); line-height: 1.6;"></p>
            <div style="display: flex; justify-content: center; gap: 1rem;">
                <button id="confirmOk" class="btn-primary" style="width: auto; padding: 0.6rem 1.5rem;">Confirmar</button>
                <button id="confirmCancel" class="btn-secondary" style="padding: 0.6rem 1.5rem;">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal para Responder Mensajes -->
    <div id="replyModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3>Responder Consulta</h3>
                <span class="close-btn" onclick="closeReplyModal()">&times;</span>
            </div>
            <form id="replyForm">
                <input type="hidden" id="replyMsgId">
                <div class="form-group mb-3">
                    <label for="replyUser">Para</label>
                    <input type="text" id="replyUser" readonly style="background-color: rgba(0,0,0,0.2); cursor: not-allowed;">
                </div>
                <div class="form-group mb-3">
                    <label for="replyOriginal">Mensaje Original</label>
                    <div id="replyOriginal" class="p-2 rounded border text-start" style="background-color: rgba(0,0,0,0.1); font-size: 0.85rem; max-height: 120px; overflow-y: auto; white-space: pre-wrap; color: var(--text-primary);"></div>
                </div>
                <div class="form-group mb-3">
                    <label for="replyText">Respuesta</label>
                    <textarea id="replyText" rows="4" placeholder="Escribe tu respuesta aquí..." style="width: 100%; padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-primary); font-family: var(--font-family); resize: vertical;" required maxlength="1000"></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeReplyModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="replySubmitBtn" style="width: auto;">Enviar Respuesta</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/mensajes_admin.js"></script>
</body>
</html>
